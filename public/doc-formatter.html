<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AerChain Document Formatter — Dark Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas-a:hsl(262 55% 18%);--canvas-b:hsl(270 45% 12%);--canvas-c:hsl(255 40% 10%);--canvas-d:hsl(245 35% 8%);
  --aerchain:#DC5F40;
  --gp:linear-gradient(135deg,hsl(262 80% 55%),hsl(275 85% 58%));
  --active-glow:hsl(262 80% 55%/.25);
  --glass-1:rgba(255,255,255,.03);--glass-2:rgba(255,255,255,.06);--glass-3:rgba(255,255,255,.10);
  --glass-border:rgba(255,255,255,.06);--glass-border-h:rgba(255,255,255,.14);
  --fg:rgba(255,255,255,.94);--fg2:rgba(255,255,255,.72);--fg3:rgba(255,255,255,.42);
  --nav-bg:linear-gradient(180deg,hsl(262 40% 14%/.96),hsl(255 35% 10%/.88));
  --r:16px;--rm:12px;
  --dot:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);
}
html,body{height:100%;font-family:'Montserrat',system-ui,sans-serif;color:var(--fg);
  background:linear-gradient(145deg,var(--canvas-d),var(--canvas-c) 30%,var(--canvas-b) 60%,var(--canvas-a) 100%) fixed}

/* NAV */
nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:56px;background:var(--nav-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--glass-border)}
.logo{font-weight:700;font-size:18px;letter-spacing:-.02em}
.logo span{color:var(--aerchain)}
.nav-right{display:flex;align-items:center;gap:16px}

/* THEME DOTS */
.theme-bar{display:flex;align-items:center;gap:6px}
.theme-bar-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.12em;color:var(--fg3);margin-right:4px}
.td{width:12px;height:12px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .2s}
.td:hover{transform:scale(1.2)}
.td.active{border-color:rgba(255,255,255,.7)}
.td[data-t="purple-glass"]{background:#7c3aed}
.td[data-t="deep-ocean"]{background:#0ea5e9}
.td[data-t="rose-quartz"]{background:#ec4899}
.td[data-t="midnight-emerald"]{background:#10b981}
.td[data-t="arctic"]{background:#3b82f6}
.td[data-t="topaz"]{background:#14b8a6}
.td[data-t="citrine"]{background:#eab308}
.td[data-t="slate"]{background:#6366f1}

/* THEME VARIANTS */
[data-theme="deep-ocean"]{--canvas-a:hsl(200 55% 16%);--canvas-b:hsl(210 50% 11%);--canvas-c:hsl(215 45% 9%);--canvas-d:hsl(220 40% 7%);
  --gp:linear-gradient(135deg,hsl(195 85% 45%),hsl(175 80% 42%));--active-glow:hsl(195 85% 45%/.25);
  --nav-bg:linear-gradient(180deg,hsl(200 55% 16%/.96),hsl(210 50% 11%/.88))}
[data-theme="rose-quartz"]{--canvas-a:hsl(330 38% 15%);--canvas-b:hsl(335 32% 11%);--canvas-c:hsl(340 28% 9%);--canvas-d:hsl(345 22% 7%);
  --gp:linear-gradient(135deg,hsl(330 72% 58%),hsl(290 70% 55%));--active-glow:hsl(330 72% 58%/.25);
  --nav-bg:linear-gradient(180deg,hsl(330 30% 13%/.96),hsl(335 25% 9%/.88))}
[data-theme="midnight-emerald"]{--canvas-a:hsl(155 40% 14%);--canvas-b:hsl(160 35% 10%);--canvas-c:hsl(165 30% 8%);--canvas-d:hsl(170 25% 6%);
  --gp:linear-gradient(135deg,hsl(152 68% 42%),hsl(165 75% 38%));--active-glow:hsl(152 68% 42%/.25);
  --nav-bg:linear-gradient(180deg,hsl(155 35% 12%/.96),hsl(160 30% 8%/.88))}
[data-theme="arctic"]{--canvas-a:hsl(225 45% 16%);--canvas-b:hsl(230 40% 12%);--canvas-c:hsl(235 35% 9%);--canvas-d:hsl(240 30% 7%);
  --gp:linear-gradient(135deg,hsl(217 88% 58%),hsl(200 90% 55%));--active-glow:hsl(217 88% 58%/.25);
  --nav-bg:linear-gradient(180deg,hsl(225 40% 14%/.96),hsl(230 35% 10%/.88))}
[data-theme="topaz"]{--canvas-a:hsl(192 40% 14%);--canvas-b:hsl(196 36% 10%);--canvas-c:hsl(200 32% 8%);--canvas-d:hsl(205 28% 6%);
  --gp:linear-gradient(135deg,hsl(188 80% 48%),hsl(42 88% 52%));--active-glow:hsl(188 80% 48%/.25);
  --nav-bg:linear-gradient(180deg,hsl(192 35% 12%/.96),hsl(196 30% 8%/.88))}
[data-theme="citrine"]{--canvas-a:hsl(48 55% 12%);--canvas-b:hsl(45 50% 9%);--canvas-c:hsl(42 45% 7%);--canvas-d:hsl(38 40% 5%);
  --gp:linear-gradient(135deg,hsl(48 95% 52%),hsl(38 90% 44%));--active-glow:hsl(48 95% 52%/.30);
  --nav-bg:linear-gradient(180deg,hsl(48 45% 10%/.96),hsl(45 40% 7%/.88))}
[data-theme="slate"]{--canvas-a:hsl(215 22% 15%);--canvas-b:hsl(218 20% 11%);--canvas-c:hsl(220 18% 9%);--canvas-d:hsl(222 16% 7%);
  --gp:linear-gradient(135deg,hsl(213 72% 52%),hsl(232 68% 58%));--active-glow:hsl(213 72% 52%/.25);
  --nav-bg:linear-gradient(180deg,hsl(215 20% 13%/.96),hsl(218 18% 9%/.88))}

/* MAIN LAYOUT */
.app{display:flex;flex-direction:column;height:calc(100vh - 56px)}
.workspace{display:flex;flex:1;overflow:hidden}

/* INPUT PANEL */
.input-panel{width:420px;min-width:360px;display:flex;flex-direction:column;border-right:1px solid var(--glass-border);
  background:var(--glass-1)}
.panel-header{padding:20px 24px 16px;border-bottom:1px solid var(--glass-border)}
.panel-title{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;
  letter-spacing:.14em;color:var(--fg3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel-title::before{content:'';width:16px;height:1.5px;border-radius:1px;background:var(--gp)}

/* INPUT AREA */
.input-body{flex:1;display:flex;flex-direction:column;padding:16px 24px;gap:16px;overflow-y:auto}
.input-mode{display:flex;gap:8px}
.mode-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--glass-border);background:transparent;
  color:var(--fg3);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;
  text-transform:uppercase;letter-spacing:.08em;transition:all .2s}
.mode-btn:hover{border-color:var(--glass-border-h);color:var(--fg2)}
.mode-btn.active{background:var(--glass-3);border-color:var(--glass-border-h);color:var(--fg)}

.text-input{flex:1;min-height:200px;background:var(--glass-1);border:1px solid var(--glass-border);border-radius:var(--rm);
  padding:16px;color:var(--fg);font-family:'Montserrat',sans-serif;font-size:14px;line-height:1.6;resize:none;
  outline:none;transition:border-color .2s}
.text-input::placeholder{color:var(--fg3)}
.text-input:focus{border-color:var(--glass-border-h)}

/* FILE DROP ZONE */
.drop-zone{border:2px dashed var(--glass-border);border-radius:var(--r);padding:40px 24px;text-align:center;
  cursor:pointer;transition:all .3s;position:relative;display:none;flex-direction:column;align-items:center;gap:12px}
.drop-zone.visible{display:flex}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--glass-border-h);background:var(--glass-1)}
.drop-zone-icon{font-size:36px;opacity:.4}
.drop-zone-text{font-size:14px;color:var(--fg2)}
.drop-zone-sub{font-size:12px;color:var(--fg3);font-family:'JetBrains Mono',monospace}
.file-input{display:none}
.file-name{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--fg2);padding:8px 14px;
  background:var(--glass-2);border-radius:8px;display:none;align-items:center;gap:8px}
.file-name.visible{display:flex}

/* THEME SELECTOR IN INPUT */
.theme-select{display:flex;align-items:center;gap:8px}
.theme-select-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--fg3);
  text-transform:uppercase;letter-spacing:.08em}
.theme-select .td{width:16px;height:16px}

/* FORMAT BUTTON */
.format-btn{margin:0 24px 20px;padding:14px;border:none;border-radius:var(--rm);background:var(--gp);
  color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden;letter-spacing:.02em}
.format-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--active-glow)}
.format-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.format-btn .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}
.format-btn.loading .spinner{display:inline-block}
.format-btn.loading .btn-text{opacity:.8}
@keyframes spin{to{transform:rotate(360deg)}}

/* OUTPUT PANEL */
.output-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.output-header{padding:20px 24px 16px;border-bottom:1px solid var(--glass-border);display:flex;
  align-items:center;justify-content:space-between}
.output-actions{display:flex;gap:8px}
.action-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--glass-border);background:transparent;
  color:var(--fg2);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;
  text-transform:uppercase;letter-spacing:.06em;transition:all .2s}
.action-btn:hover{border-color:var(--glass-border-h);color:var(--fg);background:var(--glass-2)}
.action-btn:disabled{opacity:.3;cursor:not-allowed}

/* PREVIEW */
.preview-container{flex:1;overflow:hidden;background:#0a0a0f}
.preview-container iframe{width:100%;height:100%;border:none}

/* STATUS */
.status-bar{padding:8px 24px;border-top:1px solid var(--glass-border);display:flex;align-items:center;
  justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--fg3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--fg3);margin-right:8px;display:inline-block}
.status-dot.ready{background:hsl(152 68% 42%)}
.status-dot.working{background:hsl(38 92% 50%);animation:pulse 1.5s infinite}
.status-dot.error{background:hsl(0 68% 48%)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  color:var(--fg3);text-align:center;padding:40px}
.empty-icon{font-size:48px;opacity:.3}
.empty-title{font-size:18px;font-weight:500;color:var(--fg2)}
.empty-desc{font-size:13px;max-width:320px;line-height:1.6}

/* STREAMING INDICATOR */
.streaming-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--fg3);padding:16px 24px;
  overflow-y:auto;flex:1;white-space:pre-wrap;word-break:break-all;display:none}
.streaming-text.visible{display:block}

/* RESPONSIVE */
@media(max-width:900px){
  .workspace{flex-direction:column}
  .input-panel{width:100%;min-width:unset;max-height:45vh;border-right:none;border-bottom:1px solid var(--glass-border)}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--glass-border-h);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--glass-3)}
</style>
</head>
<body data-theme="purple-glass">

<nav>
  <div class="logo"><span>Aer</span>Chain <span style="font-weight:300;font-size:14px;color:var(--fg3);margin-left:4px">Doc Formatter</span></div>
  <div class="nav-right">
    <div class="theme-bar">
      <span class="theme-bar-label">Theme</span>
      <div class="td active" data-t="purple-glass" onclick="setAppTheme(this)"></div>
      <div class="td" data-t="deep-ocean" onclick="setAppTheme(this)"></div>
      <div class="td" data-t="rose-quartz" onclick="setAppTheme(this)"></div>
      <div class="td" data-t="midnight-emerald" onclick="setAppTheme(this)"></div>
      <div class="td" data-t="arctic" onclick="setAppTheme(this)"></div>
      <div class="td" data-t="topaz" onclick="setAppTheme(this)"></div>
      <div class="td" data-t="citrine" onclick="setAppTheme(this)"></div>
      <div class="td" data-t="slate" onclick="setAppTheme(this)"></div>
    </div>
  </div>
</nav>

<div class="app">
  <div class="workspace">
    <!-- INPUT PANEL -->
    <div class="input-panel">
      <div class="panel-header">
        <div class="panel-title">Input Content</div>
        <div class="input-mode">
          <button class="mode-btn active" onclick="setMode('paste')">Paste Text</button>
          <button class="mode-btn" onclick="setMode('upload')">Upload File</button>
        </div>
      </div>
      <div class="input-body">
        <textarea class="text-input" id="textInput" placeholder="Paste any text, HTML, markdown, data, or document content here..."></textarea>

        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <div class="drop-zone-icon">+</div>
          <div class="drop-zone-text">Drop a file here or click to browse</div>
          <div class="drop-zone-sub">HTML, TXT, MD, CSV, JSON, PDF, DOCX, PNG, JPG</div>
          <input type="file" class="file-input" id="fileInput" accept=".html,.htm,.txt,.md,.csv,.json,.pdf,.docx,.pptx,.doc,.ppt,.rtf,.xml,.png,.jpg,.jpeg,.gif,.webp">
        </div>

        <div class="file-name" id="fileName"></div>

        <div class="theme-select">
          <span class="theme-select-label">Output Theme:</span>
          <div class="td active" data-t="purple-glass" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
          <div class="td" data-t="deep-ocean" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
          <div class="td" data-t="rose-quartz" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
          <div class="td" data-t="midnight-emerald" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
          <div class="td" data-t="arctic" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
          <div class="td" data-t="topaz" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
          <div class="td" data-t="citrine" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
          <div class="td" data-t="slate" onclick="setOutputTheme(this)" style="width:16px;height:16px"></div>
        </div>
      </div>
      <button class="format-btn" id="formatBtn" onclick="formatDocument()">
        <span class="spinner"></span>
        <span class="btn-text">Format with AI</span>
      </button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">
      <div class="output-header">
        <div class="panel-title">Output Preview</div>
        <div class="output-actions">
          <button class="action-btn" id="btnCopy" onclick="copyHTML()" disabled>Copy HTML</button>
          <button class="action-btn" id="btnDownload" onclick="downloadHTML()" disabled>Download</button>
          <button class="action-btn" id="btnNewTab" onclick="openNewTab()" disabled>Open Tab</button>
        </div>
      </div>
      <div class="preview-container" id="previewContainer">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#9672;</div>
          <div class="empty-title">No output yet</div>
          <div class="empty-desc">Paste content or upload a file, pick a theme, and hit "Format with AI" to generate your Aerchain-styled document.</div>
        </div>
      </div>
      <div class="status-bar">
        <div><span class="status-dot ready" id="statusDot"></span><span id="statusText">Ready</span></div>
        <div id="tokenInfo"></div>
      </div>
    </div>
  </div>
</div>

<script>
// State
let currentMode = 'paste';
let outputTheme = 'purple-glass';
let outputHTML = '';
let fileContent = '';
let fileBase64 = '';
let fileType = '';

// Lazy-load PDF.js from CDN
let _pdfjsLib = null;
async function loadPdfJs() {
  if (_pdfjsLib) return _pdfjsLib;
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = () => {
      _pdfjsLib = window.pdfjsLib;
      _pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(_pdfjsLib);
    };
    script.onerror = () => reject(new Error('Failed to load PDF.js'));
    document.head.appendChild(script);
  });
}

// Lazy-load mammoth.js from CDN
let _mammoth = null;
async function loadMammoth() {
  if (_mammoth) return _mammoth;
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
    script.onload = () => { _mammoth = window.mammoth; resolve(_mammoth); };
    script.onerror = () => reject(new Error('Failed to load mammoth.js'));
    document.head.appendChild(script);
  });
}

// App theme (the UI itself)
function setAppTheme(el) {
  document.body.setAttribute('data-theme', el.dataset.t);
  document.querySelectorAll('nav .td').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}

// Output theme (what the generated doc will use)
function setOutputTheme(el) {
  outputTheme = el.dataset.t;
  document.querySelectorAll('.theme-select .td').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}

// Input mode
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-btn[onclick="setMode('${mode}')"]`).classList.add('active');

  const textInput = document.getElementById('textInput');
  const dropZone = document.getElementById('dropZone');

  if (mode === 'paste') {
    textInput.style.display = 'block';
    dropZone.classList.remove('visible');
  } else {
    textInput.style.display = 'none';
    dropZone.classList.add('visible');
  }
}

// File handling
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

async function handleFile(file) {
  const fn = document.getElementById('fileName');
  fn.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
  fn.classList.add('visible');

  // Helper: convert file to base64
  async function toBase64(f) {
    const buf = await f.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  if (file.name.match(/\.(pdf)$/i)) {
    // PDF: try text extraction first, fall back to sending raw PDF to Claude
    setStatus('working', 'Extracting text from PDF...');
    fileBase64 = '';
    fileType = '';
    try {
      const pdfjsLib = await loadPdfJs();
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '\n\n';
      }
      fileContent = text.trim();
      if (!fileContent) throw new Error('no-text');
      setStatus('ready', `Extracted ${pdf.numPages} pages — ready to format`);
    } catch (err) {
      // Text extraction failed (scanned/image PDF) — send raw PDF to Claude
      fileContent = '';
      fileBase64 = await toBase64(file);
      fileType = 'application/pdf';
      setStatus('ready', 'PDF loaded (will send directly to Claude) — ready to format');
    }
  } else if (file.name.match(/\.(png|jpe?g|gif|webp)$/i)) {
    // Images: send directly to Claude
    fileContent = '';
    fileBase64 = await toBase64(file);
    fileType = file.type || 'image/png';
    setStatus('ready', 'Image loaded — ready to format');
  } else if (file.name.match(/\.(docx)$/i)) {
    // DOCX: use mammoth.js to extract text client-side
    setStatus('working', 'Extracting text from DOCX...');
    try {
      const mammoth = await loadMammoth();
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer });
      fileContent = result.value.trim();
      if (!fileContent) throw new Error('No text found in DOCX');
      setStatus('ready', 'Text extracted — ready to format');
    } catch (err) {
      setStatus('error', 'DOCX extraction failed: ' + err.message + '. Try pasting the text instead.');
      fileContent = '';
    }
  } else if (file.name.match(/\.(doc|pptx?|xlsx?)$/i)) {
    setStatus('error', 'Binary format not yet supported. Please save as PDF, paste the text, or export as HTML.');
    fileContent = '';
  } else {
    // Text-based files: read directly
    fileContent = await file.text();
    setStatus('ready', 'File loaded — ready to format');
  }
}

// Status
function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

// FORMAT
async function formatDocument() {
  const content = currentMode === 'paste' ? document.getElementById('textInput').value.trim() : fileContent.trim();

  if (!content && !fileBase64) {
    setStatus('error', 'No content provided');
    return;
  }

  const btn = document.getElementById('formatBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  setStatus('working', 'Formatting with Claude AI...');

  // Clear preview
  const container = document.getElementById('previewContainer');
  document.getElementById('emptyState')?.remove();

  try {
    // Use streaming
    const response = await fetch('/api/doc-format', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: content || undefined, defaultTheme: outputTheme, stream: true, fileBase64: fileBase64 || undefined, fileType: fileType || undefined }),
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'API request failed');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullHTML = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            if (parsed.text) fullHTML += parsed.text;
          } catch {}
        }
      }
    }

    outputHTML = fullHTML;

    // Render in iframe
    let iframe = container.querySelector('iframe');
    if (!iframe) {
      iframe = document.createElement('iframe');
      container.appendChild(iframe);
    }
    iframe.srcdoc = outputHTML;

    // Enable action buttons
    document.getElementById('btnCopy').disabled = false;
    document.getElementById('btnDownload').disabled = false;
    document.getElementById('btnNewTab').disabled = false;

    setStatus('ready', 'Document formatted successfully');
    document.getElementById('tokenInfo').textContent = (outputHTML.length / 1024).toFixed(1) + ' KB output';

  } catch (err) {
    setStatus('error', err.message);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// Actions
function copyHTML() {
  navigator.clipboard.writeText(outputHTML).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy HTML', 1500);
  });
}

function downloadHTML() {
  const blob = new Blob([outputHTML], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'aerchain-formatted-document.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function openNewTab() {
  const w = window.open();
  w.document.write(outputHTML);
  w.document.close();
}
</script>
